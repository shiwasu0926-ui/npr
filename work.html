<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創作</title>

<meta name="robots" content="noindex, nofollow">

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f0f0;
  color: #222;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
}

/* 創作カード */

.world-card {

  background: #fafafa;

  border-radius: 18px;

  padding: 20px;
  margin-bottom: 24px;

  border: 1px solid #e5e5e5;

  transition: 0.2s;
}

.world-card:hover {

  transform: translateY(-3px);

  box-shadow:
  0 6px 18px rgba(0,0,0,0.08);

}

/* タイトル部分リンク */

.world-main {

  display: block;

  text-decoration: none;
  color: inherit;
}

/* タイトル */

.world-title {

  margin: 0 0 10px;

  font-size: 24px;
  font-weight: bold;
}

/* 説明 */

.world-text {

  margin: 0;

  font-size: 14px;
  line-height: 1.8;

  color: #666;
}

/* 線 */

.world-line {

  margin: 18px 0;

  border: none;
  border-top: 1px solid #ddd;
}

/* キャラ一覧 */

.mini-character-list {

  display: flex;
  flex-wrap: wrap;

  gap: 10px;
}

/* ミニキャラカード */

.mini-character {

  display: flex;
  align-items: center;
  gap: 8px;

  background: #f3f3f3;

  border-radius: 999px;

  padding: 6px 12px;

  font-size: 13px;

  text-decoration: none;
  color: inherit;

  transition: 0.2s;
}

.mini-character:hover {

  background: #e8e8e8;

  transform: translateY(-2px);
}

.mini-character img {

  width: 28px;
  height: 28px;

  border-radius: 50%;
  object-fit: cover;

  flex-shrink: 0;
}

.mini-character span {

  white-space: nowrap;
}

/* etc */

.mini-etc {

  display: flex;
  align-items: center;
  justify-content: center;

  background: #f3f3f3;

  border-radius: 999px;

  padding: 6px 12px;

  font-size: 13px;
  color: #666;
}

/* スマホ */

@media (max-width: 600px) {

  .container {
    padding: 16px;
  }

  .world-card {
    padding: 16px;
  }

  .world-title {
    font-size: 20px;
  }

  .world-text {
    font-size: 13px;
  }

  .mini-character {

    padding: 5px 10px;
    font-size: 12px;
  }

  .mini-character img {

    width: 24px;
    height: 24px;
  }

}

</style>
</head>

<body>
