<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ラルくんの観察日記</title>

<style>

body{
  margin:0;
  background:#f0f0f0;
  font-family:sans-serif;
  color:#222;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  background:white;
}

h1{
  margin-top:0;
  margin-bottom:25px;
  font-size:30px;
}

/* 登場キャラ枠 */

.character-box{
  border:1px solid #ddd;
  border-radius:16px;
  padding:16px;
  margin-bottom:50px;
  background:#fafafa;
}

.character-mini{
  display:flex;
  align-items:center;
  gap:14px;
}

.character-icon{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  object-position:center top;
  flex-shrink:0;
}

.character-text{
  line-height:1.7;
}

.character-text a{
  color:#222;
  text-decoration:none;
  font-size:18px;
}

.character-text a:hover{
  text-decoration:underline;
}

/* 会話 */

.chat-area{
  display:flex;
  flex-direction:column;
  gap:22px;
}

/* 時間表示 */

.time-label{
  text-align:center;
  font-size:16px;
  font-weight:normal;
  color:#777;
  margin:40px 0;
  letter-spacing:1px;
}

/* 左右共通 */

.message-left,
.message-right{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.message-right{
  justify-content:flex-end;
}

/* アイコン */

.icon{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  object-position:center top;
  flex-shrink:0;
}

/* 名前 */

.name{
  font-size:13px;
  font-weight:bold;
  color:#666;
  margin-bottom:6px;
}

.right-name{
  text-align:right;
}

/* 吹き出し */

.bubble{
  background:white;
  border:1px solid #e5e5e5;
  border-radius:16px;
  padding:14px 18px;
  line-height:1.8;
  display:inline-block;
  max-width:520px;
  min-width:120px;
  width:fit-content;
  box-sizing:border-box;
  word-break:normal;
  overflow-wrap:break-word;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* スマホ */

@media (max-width:600px){

  .container{
    padding:16px;
  }

  h1{
    font-size:24px;
  }

  .bubble{
    max-width:75vw;
    font-size:14px;
  }

  .icon,
  .character-icon{
    width:60px;
    height:60px;
  }

  .time-label{
    font-size:14px;
  }

}

</style>
</head>

<body>

<div class="container">

<a href="npr1.html">トップ</a> ＞

<h1>
ラルくんの観察日記
</h1>

<!-- 登場キャラクター -->

<div class="character-box">

  <div class="character-mini">

    <img src="rr@.png" class="character-icon">

    <div class="character-text">

      <a href="rr.html">
        <strong>ラル</strong>
      </a><br>

      お風呂も寝るときもフランと一緒。<br>
      最近他フルーフ員の観察を始めているらしい。

    </div>

  </div>

</div>

<!-- 会話 -->

<div class="chat-area">

  <div class="time-label">
    ──────── 7:00　起床 ────────
  </div>

  <div class="message-left">

    <img src="rr@.png" class="icon">

    <div>

      <div class="name">
        ラル
      </div>

      <div class="bubble">
        ……おねむだね。
      </div>

    </div>

  </div>

</div>

</div>

</body>
</html>
