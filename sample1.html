<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>にーにと呼んでほしい。</title>

<style>
body {
  margin: 0;
  background: #f0f0f0;
  font-family: sans-serif;
  color: #222;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
}

h1 {
  margin-top: 0;
  margin-bottom: 25px;

  font-size: 30px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}



/* 登場キャラ */

.character-box {
  display: flex;
  flex-direction: column;
  gap: 14px;

  margin-bottom: 35px;
}

.character-mini {
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 12px 0;
  border-top: 1px solid #ccc;
}

.character-icon {
  width: 60px;
  height: 60px;

  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.character-text {
  line-height: 1.7;
}

.character-text a {
  color: #222;
  text-decoration: none;
  font-size: 18px;
}

.character-text a:hover {
  text-decoration: underline;
}



/* 会話 */

.chat-area {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.message-left {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.message-left .icon {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.message-left .bubble {
  background: #e8f3ff;
  padding: 14px 16px;
  border-radius: 16px;

  max-width: 75%;
  line-height: 1.8;
}

.message-right {
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
  gap: 10px;
}

.message-right .icon {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.message-right .bubble {
  background: #8fbc8b;
  padding: 14px 16px;
  border-radius: 16px;

  max-width: 75%;
  line-height: 1.8;
}

@media (max-width: 600px) {

  .message-left .bubble,
  .message-right .bubble {
    max-width: 68%;
  }

}
</style>
</head>

<body>

<div class="container">

   <a href="npr1.html">トップ</a> ＞

  
  <h1>フルーフの休日</h1>

  <!-- 登場キャラクター -->

  <div class="character-box">

    <div class="character-mini">

      <img src="sitera.png" class="character-icon">

      <div class="character-text">
        <a href="sitera.html"><strong>シテラ</strong></a><br>
       暇な時はよく他役員にちょっかいをかけている。
      </div>

    </div>

    <div class="character-mini">

      <img src="hrn.png" class="character-icon">

      <div class="character-text">
        <a href="hrn.html"><strong>フラン</strong></a><br>
        最近はラルのお洋服をたくさん作ってあげている。
      </div>

    </div>

<div class="character-mini">

      <img src="rr.png" class="character-icon">

      <div class="character-text">
        <a href="rr.html"><strong>ラル</strong></a><br>
        寝るときもお風呂も毎日フランと一緒。
      </div>

    </div>

    <div class="character-mini">

      <img src="pts.png" class="character-icon">

      <div class="character-text">
        <a href="pts.html"><strong>パトシー</strong></a><br>
        最近ちょっとずつ飛べるようになってきた
      </div>

    </div>
    
  </div>

  <!-- 会話 -->

  <div class="chat-area">

    <div class="message-left">

      <img src="rr.png" class="icon">

      <div class="bubble">
       おねむだね。<br>
      </div>

    </div>

    <div class="message-right">

      <div class="bubble">
        あらあら。<br>
      </div>

      <img src="pts.png" class="icon">

    </div>

  </div>

</div>
</body>
</html>
